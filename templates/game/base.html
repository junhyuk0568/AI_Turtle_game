{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI 바다거북스프{% endblock %}</title>
    <style>
        :root {
            --bg: #eef4f2;
            --surface: #ffffff;
            --surface-soft: #f7faf9;
            --ink: #17201d;
            --muted: #65736e;
            --line: #dce6e2;
            --primary: #0f766e;
            --primary-dark: #115e59;
            --accent: #e76f51;
            --accent-soft: #fff0ea;
            --yes: #0f766e;
            --no: #b42318;
            --maybe: #7c3aed;
            --irrelevant: #536471;
            --shadow: 0 18px 50px rgba(21, 35, 31, 0.11);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(231, 111, 81, 0.16), transparent 30rem),
                linear-gradient(135deg, #eef4f2 0%, #f7fbfa 48%, #eef3f8 100%);
            color: var(--ink);
            font-family: Arial, "Noto Sans KR", sans-serif;
            letter-spacing: 0;
        }

        a {
            color: inherit;
        }

        .app-shell {
            width: min(1120px, calc(100% - 32px));
            margin: 0 auto;
            padding: 18px 0 28px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 18px;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            font-weight: 800;
        }

        .brand-logo {
            display: block;
            width: min(230px, 48vw);
            height: 44px;
            object-fit: contain;
            object-position: left center;
        }

        .nav-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 40px;
            padding: 0 14px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.7);
            color: var(--muted);
            text-decoration: none;
            font-weight: 700;
        }

        .page-header {
            margin-bottom: 16px;
        }

        .eyebrow {
            margin: 0 0 10px;
            color: var(--primary-dark);
            font-size: 14px;
            font-weight: 800;
        }

        h1, h2, h3, p {
            margin-top: 0;
        }

        h1 {
            margin-bottom: 12px;
            font-size: clamp(32px, 4vw, 52px);
            line-height: 1.08;
        }

        h2 {
            font-size: 20px;
            line-height: 1.3;
        }

        .lead {
            max-width: 720px;
            margin-bottom: 0;
            color: var(--muted);
            font-size: 17px;
            line-height: 1.7;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 0 18px;
            border: 0;
            border-radius: 8px;
            background: var(--primary);
            color: #ffffff;
            font: inherit;
            font-weight: 800;
            text-decoration: none;
            cursor: pointer;
            white-space: nowrap;
        }

        .button:hover {
            background: var(--primary-dark);
        }

        .button.secondary {
            border: 1px solid var(--line);
            background: #ffffff;
            color: var(--ink);
        }

        .button.warning {
            background: var(--accent);
        }

        .button:disabled {
            background: #aab7b2;
            cursor: not-allowed;
        }

        .empty-state {
            padding: 24px;
            border: 1px dashed #b8c8c3;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.75);
            color: var(--muted);
            line-height: 1.6;
        }

        .meta {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.5;
        }

        @media (max-width: 760px) {
            .app-shell {
                width: min(100% - 24px, 1120px);
                padding-top: 18px;
            }

            .topbar {
                align-items: flex-start;
            }

            h1 {
                font-size: 34px;
            }
        }
    </style>
    {% block extra_style %}{% endblock %}
</head>
<body>
    <main class="app-shell">
        <nav class="topbar" aria-label="상단 메뉴">
            <a class="brand" href="{% url 'game:home' %}">
                <img class="brand-logo" src="{% static 'game/img/game-logo-transparent.png' %}" alt="AI 바다거북스프">
            </a>
            {% block topbar_action %}{% endblock %}
        </nav>

        {% block content %}{% endblock %}
    </main>
</body>
</html>
